name: refresh-stars

# 매일 별(star) 개수를 GitHub API로 새로 받아 stars.json을 갱신한다.
# 변경이 있을 때만 커밋 → GitHub Pages 자동 반영.
on:
  schedule:
    - cron: "17 0 * * *"   # 매일 00:17 UTC (한국 09:17)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 별 수 갱신
        run: node scripts/refresh-stars.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 변경 시 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stars.json
          git diff --staged --quiet || (git commit -m "chore: 별 개수 자동 갱신" && git push)
